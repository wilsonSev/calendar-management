syntax = "proto3";

package analyzer.v1;
option go_package = "github.com/wilsonSev/calendar-management/proto/analyzer/v1;analyzerv1";

service AnalyzerService {
  rpc AnalyzeText(AnalyzeTextRequest) returns (AnalyzeTextResponse);
}

message AnalyzeTextRequest {
  int64 tg_user_id = 1;
  string text = 2;        // raw text from user
  string timezone = 3;    // e.g. "Europe/Zurich"
  int64 chat_id = 4;      // optional: for correlation/logging
}

message AnalyzeTextResponse {
  oneof result {
    CreateEvent create_event = 1;
    NeedClarification need_clarification = 2;
    Error error = 3;
  }
}

message CreateEvent {
  string title = 1;
  string description = 2;
  int64 start_unix = 3;   // unix seconds
  int64 end_unix = 4;     // unix seconds
}

message NeedClarification {
  string question = 1;    // what bot should ask user
}

message Error {
  string message = 1;     // user-friendly error
}